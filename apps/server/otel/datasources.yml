apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://chms_prometheus:9090
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://chms_loki:3100
    isDefault: true
    editable: true

  - name: Tempo
    type: tempo
    access: proxy
    url: http://chms_tempo:3200
    editable: true

    jsonData:
      tracesToLogs:
        datasourceUid: loki
