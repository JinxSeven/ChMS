services:
  api:
    image: ${DOCKER_REGISTRY-}api
    container_name: chms_api
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        APP_UID: 1000

    environment:
      - ASPNETCORE_URLS=http://+:8080

    ports:
      - "8080:8080"   # ❌ removed 8081 (no HTTPS)

    depends_on:
      database:
        condition: service_healthy
      loki:
        condition: service_started

    # ✅ Added healthcheck (important)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: postgres:18.3
    container_name: chms_db

    environment:
      POSTGRES_DB: chms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: letmein

    volumes:
      - chms_db_data:/var/lib/postgresql   # ✅ correct for PG18+

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chms"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  loki:
    image: grafana/loki:2.9.0
    container_name: chms_loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.0
    container_name: chms_promtail

    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./api/promtail-config.yml:/etc/promtail/config.yml

    command: -config.file=/etc/promtail/config.yml

    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.0
    container_name: chms_grafana

    ports:
      - "3000:3000"

    depends_on:
      - loki

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  chms_db_data: