services:
  api:
    image: ${DOCKER_REGISTRY-}api
    container_name: chms_api
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        APP_UID: 1000

    environment:
      - ASPNETCORE_URLS=http://+:8080

    ports:
      - "8080:8080"

    depends_on:
      - database
      - otel-collector

  database:
    image: postgres:18.3
    container_name: chms_db

    environment:
      POSTGRES_DB: chms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: letmein

    volumes:
      - chms_db_data:/var/lib/postgresql

    ports:
      - "5432:5432"

  #LOKI
  loki:
    image: grafana/loki:3.0.0
    container_name: chms_loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./api/loki-config.yaml:/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"

  #TEMPO
  tempo:
    image: grafana/tempo:2.4.1
    container_name: chms_tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./api/tempo-config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"

  #PROMETHEUS
  prometheus:
    image: prom/prometheus
    container_name: chms_prometheus
    volumes:
      - ./api/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  #OTEL COLLECTOR (CORE)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: chms_otel
    command: ["--config=/etc/otel/config.yaml"]

    volumes:
      - ./api/otel-config.yaml:/etc/otel/config.yaml

    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"

    depends_on:
      - loki
      - tempo
      - prometheus

  grafana:
    image: grafana/grafana:10.4.0
    container_name: chms_grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    depends_on:
      - loki
      - tempo
      - prometheus

volumes:
  chms_db_data: