receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  #traces → tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  #metrics → prometheus
  prometheus:
    endpoint: "0.0.0.0:9464"

  #logs → loki
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  debug:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]