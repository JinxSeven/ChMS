auth_enabled: false

server:
  http_listen_port: 3100

limits_config:
  allow_structured_metadata: true

common:
  path_prefix: /tmp/loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

storage_config:
  filesystem:
    directory: /tmp/loki/chunks

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Required for single binary mode
ingester:
  wal:
    enabled: true

compactor:
  working_directory: /tmp/loki/compactor

ruler:
  storage:
    type: local
    local:
      directory: /tmp/loki/rules